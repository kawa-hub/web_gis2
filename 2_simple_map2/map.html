<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>GIS Viewer</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/leaflet.css" />
<link rel="stylesheet" href="css/leaflet-search.min.css" />
<link rel="stylesheet" href="css/leaflet.defaultextent.css" />
<link rel="stylesheet" href="css/Control.MiniMap.min.css"/>
<link rel="stylesheet" href="css/easy-button.css"/>

<script src="js/leaflet.js"></script>
<script src="js/leaflet-search.min.js"></script>
<script src="js/Control.MiniMap.min.js"></script>
<script src="js/leaflet.defaultextent.js"></script>
<script src="js/easy-button.js"></script>

<!-- CSV不要 → 削除 -->
<!-- <script src="js/papaparse.min.js"></script> -->

<!-- JSデータ読込 -->
<script src="data/data.js"></script>

<style>
body {margin: 0;font-family: sans-serif;}
#header {
    height: 60px;
    padding: 10px;
    background: white;
    border-bottom: 1px solid #ccc;
    display: flex; 
    justify-content: space-between;
    align-items: center;
}

#title-area { display: flex; align-items: center; gap: 10px; }
#title-icon { width: 50px; height: 50px; }

#container {
    display: flex;
    height: calc(100vh - 80px);
}
#map {flex: 1;}
#table-area {
    width: 20%;
    overflow-y: auto;
    border-left: 1px solid #ccc;
    padding: 10px;
    font-size: 10px;
    font-family: 'Noto Sans JP', sans-serif;
}

#title {
    font-size: 20px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: #333;
}

.dashboard-img {
    width: 100%;
    max-width: 350px;
    cursor: pointer;
    border: 1px solid #ccc;
}
</style>
</head>

<body>

<div id="header">
    <div id="title-area"> 
        <img src="symbol/title.png" id="title-icon" alt="icon"> 
        <div id="title">GIS VIEWER - Lake Point</div> 
    </div>
</div>

<div id="container">
    <div id="map"></div>
    <div id="table-area">地点をクリックしてください</div>
</div>

<script>
// --- Leaflet 地図初期化 ---
const map = L.map('map',{defaultExtentControl: true}).setView([43.5, 142.7], 7);

var gsi_pale = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',{attribution:"国土地理院　地理院タイル"});
var gsi_img = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg',{attribution:"国土地理院　地理院タイル"});
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:"&copy; OpenStreetMap contributors"});

baseMaps = {"淡色地図": gsi_pale,"シームレス写真": gsi_img,"オープンストリートマップ": osm};
L.control.layers(baseMaps, {}, {collapsed: true}).addTo(map);
osm.addTo(map);

// Scale 
L.control.scale({maxWidth: 200}).addTo(map);

// Minimap
var gsipale2 = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png');
var miniMap = new L.Control.MiniMap(gsipale2, { toggleDisplay: true, position: 'bottomright' }).addTo(map);


// --- カスタムアイコン ---
const customIcon = L.icon({
    iconUrl: "symbol/title_symbol.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
});


// --- マーカー表示 ---
//locations.forEach(loc => {
locations.features.forEach(f => {
    const loc = f.properties;


    const marker = L.marker([loc.lat, loc.lon], { icon: customIcon }).addTo(map);

    marker.on("click", () => {
        showDashboard(loc);
    });
});


// --- ダッシュボード表示 ---
function showDashboard(loc) {
    const area = document.getElementById("table-area");

    const imgPath = `data/image/${loc.地点名}.jpg`;

    area.innerHTML = `
        <h2>${loc.地点名}</h2>
        <img src="${imgPath}" class="dashboard-img" onclick="openImage('${imgPath}')">
    `;
}

// --- 別ウィンドウで画像表示 ---
function openImage(path) {
    window.open(path, "_blank");
}

</script>

</body>
</html>
